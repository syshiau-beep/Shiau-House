<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙探險——星際領航員</title>
    <style>
        :root {
            --bg-dark: #0b1021;
            --panel-bg: #151f38;
            --text-main: #e2e8f0;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-yellow: #fbbf24;
            --grid-line: #334155;
            --axis-line: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            margin-bottom: 5px;
            text-align: center;
        }

        #game-board {
            background-color: var(--panel-bg);
            border: 2px solid #2563eb;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent-yellow);
            border-bottom: 1px solid var(--grid-line);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        #level-indicator {
            background-color: #2563eb;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        #instruction {
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 15px;
            min-height: 48px;
            color: #bae6fd;
        }

        canvas {
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            display: block;
            margin: 0 auto;
            cursor: default;
        }

        /* 控制區 (動態切換) */
        #controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 50px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2em;
        }

        input[type="number"] {
            background-color: #1e293b;
            border: 1px solid #38bdf8;
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 60px;
            text-align: center;
            font-size: 1em;
            outline: none;
        }

        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            background-color: #3b82f6;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        #feedback {
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            min-height: 28px;
        }

        .correct { color: var(--accent-green); }
        .wrong { color: var(--accent-red); }

        #action-btn {
            background-color: var(--accent-green);
            display: none;
            width: 100%;
            margin-top: 15px;
            font-size: 1.2em;
        }
        #action-btn:hover { background-color: #10b981; }

        #victory-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

    <h1>🚀 星際領航員</h1>
    
    <div id="game-board">
        <div id="game-content">
            <div id="status-bar">
                <span id="level-title">第 1 關</span>
                <span>進度: <span id="level-indicator">1/3</span></span>
                <span>積分: <span id="score">0</span></span>
            </div>
            
            <div id="instruction">系統載入中...</div>
            
            <canvas id="radar" width="400" height="400"></canvas>
            
            <div id="controls"></div>

            <div id="feedback"></div>
            <button id="action-btn" onclick="nextQuestion()">下一步</button>
        </div>

        <div id="victory-screen">
            <h2 style="color: var(--accent-yellow); font-size: 2em;">🎉 恭喜成為特級領航員！</h2>
            <p style="font-size: 1.2em; line-height: 1.6;">
                你已成功通過所有導航測試，完全掌握了直角坐標平面的奧秘。<br>
                宇宙的每個角落，都將是你的航向！
            </p>
            <button onclick="location.reload()" style="margin-top: 20px; font-size: 1.2em;">重新挑戰</button>
        </div>
    </div>

    <script>
        // 遊戲核心變數
        const canvas = document.getElementById('radar');
        const ctx = canvas.getContext('2d');
        let currentLevel = 1;
        let currentQuestion = 1; // 1 到 3
        let score = 0;
        let isAnswered = false;
        
        // 當前題目的狀態紀錄
        let targetX = 0, targetY = 0;
        let startX = 0, startY = 0; // 用於第5關
        let requiredAxis = ''; // 用於第2關

        // 畫布與網格設定
        const size = 400;
        const margin = 40;
        const originXY = size / 2;
        const step = (size - 2 * margin) / 10; // 每個單位 32px

        // 各關卡標題
        const levelNames = [
            "第 1 關：太空港停機坪 (讀取坐標)",
            "第 2 關：啟動導航雷達 (認識坐標軸)",
            "第 3 關：標定小行星 (點擊坐標)",
            "第 4 關：星區巡邏分類 (認識象限)",
            "第 5 關：躲避黑洞航線 (坐標移動)"
        ];

        // 初始化
        window.onload = () => {
            loadQuestion();
        };

        // 亂數產生器 (排除特定範圍或數值)
        function getRandomInt(min, max, exclude = []) {
            let num;
            do {
                num = Math.floor(Math.random() * (max - min + 1)) + min;
            } while (exclude.includes(num));
            return num;
        }

        // 讀取當前題目
        function loadQuestion() {
            isAnswered = false;
            document.getElementById('level-title').innerText = levelNames[currentLevel - 1];
            document.getElementById('level-indicator').innerText = `${currentQuestion}/3`;
            document.getElementById('feedback').innerText = '';
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('controls').innerHTML = ''; // 清空控制區
            
            // 隨機產生目標點 (-5 到 5)
            targetX = getRandomInt(-5, 5);
            targetY = getRandomInt(-5, 5);

            setupLevelSpecifics();
        }

        // 根據關卡設定 UI 與邏輯
        function setupLevelSpecifics() {
            const controls = document.getElementById('controls');
            const inst = document.getElementById('instruction');
            canvas.style.cursor = 'default';
            // 清除之前的點擊事件
            canvas.onclick = null; 

            switch (currentLevel) {
                case 1: // 讀取坐標
                    inst.innerHTML = `友軍星艦已標示在雷達上，請回報它的坐標。`;
                    drawGrid();
                    drawPoint(targetX, targetY, '#34d399', '🛸');
                    
                    controls.innerHTML = `
                        <div class="input-group">
                            <label>坐標 (</label>
                            <input type="number" id="inp-x" placeholder="x"> ,
                            <input type="number" id="inp-y" placeholder="y">
                            <label>)</label>
                            <button onclick="checkLevel1()">發送</button>
                        </div>
                    `;
                    break;

                case 2: // 認識坐標軸
                    const axisTasks = [
                        { type: 'origin', text: '請點擊雷達上的「原點 O」' },
                        { type: 'x-axis', text: '請點擊「 x 軸 (橫軸)」上的任意一個整數點' },
                        { type: 'y-axis', text: '請點擊「 y 軸 (縱軸)」上的任意一個整數點' }
                    ];
                    // 確保三題剛好考這三個概念
                    const task = axisTasks[currentQuestion - 1];
                    requiredAxis = task.type;
                    inst.innerHTML = task.text;
                    drawGrid();
                    
                    canvas.style.cursor = 'crosshair';
                    canvas.onclick = handleCanvasClickLevel2;
                    break;

                case 3: // 標定點 (點擊畫布)
                    inst.innerHTML = `雷達偵測到異常，請在畫面上精準點擊坐標 <b>(${targetX}, ${targetY})</b>。`;
                    drawGrid();
                    
                    canvas.style.cursor = 'crosshair';
                    canvas.onclick = handleCanvasClickLevel3;
                    break;

                case 4: // 判斷象限
                    inst.innerHTML = `隕石出現於坐標 <b>(${targetX}, ${targetY})</b>，請問它屬於哪個星區？`;
                    drawGrid();
                    drawPoint(targetX, targetY, '#f87171', '☄️');
                    
                    controls.innerHTML = `
                        <div class="btn-grid">
                            <button onclick="checkLevel4('第一象限')">第一象限</button>
                            <button onclick="checkLevel4('第二象限')">第二象限</button>
                            <button onclick="checkLevel4('第三象限')">第三象限</button>
                            <button onclick="checkLevel4('第四象限')">第四象限</button>
                            <button onclick="checkLevel4('坐標軸上')">坐標軸上</button>
                        </div>
                    `;
                    break;

                case 5: // 坐標移動
                    // 為了確保移動後不出界(-5~5)，小心設定起點與移動量
                    startX = getRandomInt(-3, 3);
                    startY = getRandomInt(-3, 3);
                    let dx = getRandomInt(-2, 2, [0]); // 不為0
                    let dy = getRandomInt(-2, 2, [0]);
                    
                    targetX = startX + dx;
                    targetY = startY + dy;
                    
                    let dirX = dx > 0 ? `向右移動 ${dx}` : `向左移動 ${Math.abs(dx)}`;
                    let dirY = dy > 0 ? `向上移動 ${dy}` : `向下移動 ${Math.abs(dy)}`;

                    inst.innerHTML = `星艦目前在 <b>(${startX}, ${startY})</b>。<br>系統指示：請${dirX}單位，再${dirY}單位。<br>請輸入跳躍後的新坐標。`;
                    drawGrid();
                    drawPoint(startX, startY, '#38bdf8', '🚀起點');
                    
                    controls.innerHTML = `
                        <div class="input-group">
                            <label>新坐標 (</label>
                            <input type="number" id="inp-x" placeholder="x"> ,
                            <input type="number" id="inp-y" placeholder="y">
                            <label>)</label>
                            <button onclick="checkLevel5()">跳躍</button>
                        </div>
                    `;
                    break;
            }
        }

        // === 各關卡檢查邏輯 ===

        function checkLevel1() {
            if (isAnswered) return;
            const px = parseInt(document.getElementById('inp-x').value);
            const py = parseInt(document.getElementById('inp-y').value);
            
            if (isNaN(px) || isNaN(py)) {
                showFeedback(false, "請輸入完整的數字坐標！");
                return;
            }

            if (px === targetX && py === targetY) {
                correctAnswer();
            } else {
                wrongAnswer(`錯誤！正確坐標為 (${targetX}, ${targetY})`);
            }
        }

        function handleCanvasClickLevel2(e) {
            if (isAnswered) return;
            let {x, y} = getClickCoords(e);
            
            let isCorrect = false;
            let msg = "";

            if (requiredAxis === 'origin') {
                isCorrect = (x === 0 && y === 0);
                msg = `原點坐標應為 (0, 0)，你點擊了 (${x}, ${y})`;
            } else if (requiredAxis === 'x-axis') {
                isCorrect = (y === 0);
                msg = `x 軸上的點 y 坐標必須為 0，你點擊了 (${x}, ${y})`;
            } else if (requiredAxis === 'y-axis') {
                isCorrect = (x === 0);
                msg = `y 軸上的點 x 坐標必須為 0，你點擊了 (${x}, ${y})`;
            }

            if (isCorrect) {
                correctAnswer();
                drawPoint(x, y, '#34d399', '📍');
            } else {
                wrongAnswer(msg);
                drawPoint(x, y, '#f87171', '❌');
            }
        }

        function handleCanvasClickLevel3(e) {
            if (isAnswered) return;
            let {x, y} = getClickCoords(e);
            
            if (x === targetX && y === targetY) {
                correctAnswer();
                drawPoint(x, y, '#34d399', '🎯');
            } else {
                wrongAnswer(`偏離目標！你點擊了 (${x}, ${y})。正確位置已標示為綠色。`);
                drawPoint(x, y, '#f87171', '❌');
                drawPoint(targetX, targetY, '#34d399', '🎯正確');
            }
        }

        function checkLevel4(selectedStr) {
            if (isAnswered) return;
            
            // 判斷真實象限
            let realQuad = "";
            if (targetX > 0 && targetY > 0) realQuad = "第一象限";
            else if (targetX < 0 && targetY > 0) realQuad = "第二象限";
            else if (targetX < 0 && targetY < 0) realQuad = "第三象限";
            else if (targetX > 0 && targetY < 0) realQuad = "第四象限";
            else realQuad = "坐標軸上";

            // 禁用按鈕
            const btns = document.querySelectorAll('.btn-grid button');
            btns.forEach(b => b.disabled = true);

            if (selectedStr === realQuad) {
                correctAnswer();
            } else {
                wrongAnswer(`錯誤！點 (${targetX}, ${targetY}) 位於 ${realQuad}。`);
            }
        }

        function checkLevel5() {
            if (isAnswered) return;
            const px = parseInt(document.getElementById('inp-x').value);
            const py = parseInt(document.getElementById('inp-y').value);
            
            if (isNaN(px) || isNaN(py)) {
                showFeedback(false, "請輸入完整的數字坐標！");
                return;
            }

            if (px === targetX && py === targetY) {
                correctAnswer();
                drawPoint(targetX, targetY, '#34d399', '✨終點');
                // 畫虛線連線
                drawDashedLine(startX, startY, targetX, targetY);
            } else {
                wrongAnswer(`計算錯誤！正確終點坐標為 (${targetX}, ${targetY})`);
                drawPoint(targetX, targetY, '#34d399', '✨正確終點');
                drawPoint(px, py, '#f87171', '❌你的答案');
                drawDashedLine(startX, startY, targetX, targetY);
            }
        }

        // === 共用功能 ===

        function getClickCoords(event) {
            const rect = canvas.getBoundingClientRect();
            const px = event.clientX - rect.left;
            const py = event.clientY - rect.top;
            
            let mathX = Math.round((px - originXY) / step);
            let mathY = Math.round((originXY - py) / step);
            // 限制範圍
            mathX = Math.max(-5, Math.min(5, mathX));
            mathY = Math.max(-5, Math.min(5, mathY));
            return {x: mathX, y: mathY};
        }

        function correctAnswer() {
            isAnswered = true;
            score += 10;
            document.getElementById('score').innerText = score;
            showFeedback(true, '✅ 任務成功！');
            setupNextButton();
        }

        function wrongAnswer(msg) {
            isAnswered = true;
            showFeedback(false, '❌ ' + msg);
            setupNextButton();
        }

        function showFeedback(isGood, msg) {
            const fb = document.getElementById('feedback');
            fb.innerText = msg;
            fb.className = isGood ? 'correct' : 'wrong';
        }

        function setupNextButton() {
            const btn = document.getElementById('action-btn');
            btn.style.display = 'block';
            if (currentQuestion === 3 && currentLevel === 5) {
                btn.innerText = "完成考核 ➔";
            } else if (currentQuestion === 3) {
                btn.innerText = "晉級下一關 ➔";
            } else {
                btn.innerText = "下一題 ➔";
            }
        }

        function nextQuestion() {
            if (currentQuestion < 3) {
                currentQuestion++;
                loadQuestion();
            } else {
                currentLevel++;
                currentQuestion = 1;
                if (currentLevel > 5) {
                    // 破關
                    document.getElementById('game-content').style.display = 'none';
                    document.getElementById('victory-screen').style.display = 'block';
                } else {
                    loadQuestion();
                }
            }
        }

        // === 繪圖相關 ===

        function drawGrid() {
            ctx.clearRect(0, 0, size, size);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // 畫次要網格線
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for (let i = -5; i <= 5; i++) {
                let pos = originXY + i * step;
                ctx.beginPath(); ctx.moveTo(pos, margin); ctx.lineTo(pos, size - margin); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(margin, pos); ctx.lineTo(size - margin, pos); ctx.stroke();
            }

            // 畫主軸 (x, y 軸)
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(margin - 15, originXY); ctx.lineTo(size - margin + 15, originXY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(originXY, margin - 15); ctx.lineTo(originXY, size - margin + 15); ctx.stroke();

            // 標示文字與數字
            ctx.fillStyle = '#cbd5e1';
            ctx.font = '14px Arial';
            ctx.fillText('x', size - margin + 20, originXY + 12);
            ctx.fillText('y', originXY - 12, margin - 20);
            ctx.fillText('O', originXY + 10, originXY + 12);

            ctx.font = '11px Arial';
            for (let i = -5; i <= 5; i++) {
                if (i !== 0) {
                    ctx.fillText(i, originXY + i * step, originXY + 15);
                    ctx.fillText(i, originXY - 15, originXY - i * step);
                }
            }
        }

        function drawPoint(x, y, color, label) {
            const px = originXY + x * step;
            const py = originXY - y * step;
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(px, py, 6, 0, Math.PI * 2);
            ctx.fill();

            if (label) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px Arial';
                // 決定文字位置避免出界
                let textY = py - 15;
                if (y === 5) textY = py + 20; 
                ctx.fillText(label, px, textY);
            }
        }

        function drawDashedLine(x1, y1, x2, y2) {
            const px1 = originXY + x1 * step;
            const py1 = originXY - y1 * step;
            const px2 = originXY + x2 * step;
            const py2 = originXY - y2 * step;

            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]); // 虛線模式
            ctx.beginPath();
            ctx.moveTo(px1, py1);
            // 先水平走再垂直走 (或是直接連線，這裡為了表現出移動過程，畫出折線)
            ctx.lineTo(px2, py1);
            ctx.lineTo(px2, py2);
            ctx.stroke();
            ctx.setLineDash([]); // 恢復實線模式
        }
    </script>
</body>
</html>
